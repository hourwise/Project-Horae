name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify:adrasteia
      - run: npm run build
      - run: npm run lint
      - run: npm test
      - run: npm run test:adrasteia:conformance
      - run: npm run test:ananke:comparator
      - run: npm run test:mnemosyne:comparator
      - run: npm run test:bench
      - run: npm run test:cli
      - run: npm run test:composition
      - run: git diff --check
